server:
  port: 8086

jwt:
  secret: YlZ2JkU3pVZ0ZkY0pNd1BqZV9rTXdkdkpTTUVnQ2Y1U1VLMU1uUWtJQ1pKd1EySzN4dnFVR0Zz

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/customer_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 👉 nên dùng update khi chạy docker lần đầu
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  config:
    import: optional:configserver:http://config-server:8888

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

customer:
  default:
    daily-limit: 10000000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
