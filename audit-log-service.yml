server:
  port: 8088

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/audit_log_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
kafka:
    consumer:
      group-id: audit-log-group

management:
  endpoints:
    web:
      exposure:
        include: prometheus
